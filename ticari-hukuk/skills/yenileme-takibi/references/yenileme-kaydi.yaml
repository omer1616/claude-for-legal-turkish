#   clm_id: "IC-12345"                    # bağlıysa
#   docusign_zarfi: "abc-123"            # bağlıysa
#   durum: "aktif"                        # aktif | iptal_edildi | yenilendi | suresi_gecti
#   notlar: "Fiyat tavansız — yenileme öncesi tekrar gözden geçir. Alternatif satıcılar: X, Y."
